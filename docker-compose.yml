version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: kvkv2000
      MYSQL_DATABASE: user_details_db
    ports:
      - "3307:3306"

  app:
    image: spring-boot-docker.jar
    container_name: springboot-container
    depends_on:
      - mysql
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_details_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kvkv2000